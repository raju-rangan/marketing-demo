<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  
  <!-- Boxes -->
  <rect x="30" y="150" width="120" height="60" rx="8" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2" />
  <text x="90" y="185" font-family="sans-serif" font-size="14" text-anchor="middle">User Request</text>

  <line x1="150" y1="180" x2="200" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="200" y="150" width="160" height="60" rx="8" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" />
  <text x="280" y="185" font-family="sans-serif" font-size="14" text-anchor="middle">Prompt Translation</text>

  <line x1="360" y1="180" x2="410" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Generation Loop Box -->
  <rect x="410" y="100" width="180" height="200" rx="8" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2" stroke-dasharray="5,5" />
  <text x="500" y="125" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Generation Loop</text>
  
  <rect x="440" y="140" width="120" height="40" rx="5" fill="#fce4ec" stroke="#d81b60" stroke-width="2" />
  <text x="500" y="165" font-family="sans-serif" font-size="12" text-anchor="middle">Generate Image</text>

  <line x1="500" y1="180" x2="500" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="440" y="210" width="120" height="40" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="2" />
  <text x="500" y="235" font-family="sans-serif" font-size="12" text-anchor="middle">AI Judge Eval</text>

  <!-- Retry loop arrow -->
  <path d="M 440 230 C 370 230, 370 160, 440 160" fill="none" stroke="#e53935" stroke-width="2" marker-end="url(#arrow)" />
  <text x="360" y="195" font-family="sans-serif" font-size="12" fill="#e53935">Fail (Retry)</text>

  <line x1="590" y1="230" x2="640" y2="230" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="615" y="220" font-family="sans-serif" font-size="12" fill="#43a047">Pass</text>

  <rect x="640" y="200" width="120" height="60" rx="8" fill="#e0f7fa" stroke="#00acc1" stroke-width="2" />
  <text x="700" y="235" font-family="sans-serif" font-size="14" text-anchor="middle">Final Image</text>

</svg>